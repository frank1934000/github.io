<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | Michael's Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #000 0%, #0a192f 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { 
      font-size: 8rem; 
      background: linear-gradient(90deg, #0070f3, #3291ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.5rem; margin-bottom: 2rem; color: #8892b0; }
    a { 
      display: inline-block;
      padding: 12px 30px;
      background: #0070f3;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }
    a:hover { background: #005bb5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>页面未找到</h2>
    <p style="margin-bottom: 2rem; color: #666;">抱歉，您访问的页面不存在或已被移除。</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
