# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: frank的博客
subtitle: '技术笔记与工程实践'
description: 'frank 的技术博客 — macOS 开发环境、PHP/Laravel 后端、Go/Rust 系统编程、AI Agent 工程化、K8s/DevOps 运维实践'
keywords:
  - PHP
  - Laravel
  - macOS
  - Go
  - Rust
  - AI Agent
  - DevOps
  - Kubernetes
  - 技术博客
author: frank
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://frank1934000.github.io
root: /
permalink: /post/:name/
permalink_defaults:
pretty_urls:
  trailing_index: false # Remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: README.md

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: false
highlight:
  enable: false
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: true
  preprocess: false
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 20
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  PHP: php
  Laravel: php
  AI: ai
  AI Agent: ai
  AI-Agent: ai
  AI/Agent: ai
  AI/ML: ai
  AI 工程化: ai
  AI/架构: ai
  Architecture: architecture
  Frontend: frontend
  macOS: macos
  Engineering: engineering
  Misc: misc
  DevOps: devops
  Network: network
  Kafka: mq
  MQ: mq
  Rust: rust
  Swift: swift
  Web3: web3
  # 废弃分类别名（兼容旧文章）
  frameworks: php
  05_php/laravel: php
  Laravel/PHP: php
  PHP/Laravel: php
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: false

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 20
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
#theme: landscape
#theme: obsidian
#theme: hexo-theme-aurora
theme: aurora

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:frank1934000/frank1934000.github.io.git
  branch: main

# SEO: sitemap / RSS / robots.txt
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

feed:
  enable: true
  type:
    - atom
    - rss2
  path:
    - atom.xml
    - rss.xml
  limit: 20
  hub:
  content: true

robotstxt:
  useragent: "*"
  allow:
    - /
  sitemap:
    - https://frank1934000.github.io/sitemap.xml
    - https://frank1934000.github.io/baidusitemap.xml


# Baidu sitemap
baidusitemap:
  path: baidusitemap.xml
  url: https://frank1934000.github.io/

# 外链自动加 nofollow（保留白名单）
nofollow:
  enable: true
  field: site
  exclude:
    - frank1934000.github.io
    - github.com/frank1934000

# 压缩（hexo-yam: HTML/CSS/JS）
neat_enable: true
neat_html:
  enable: true
  exclude:
neat_css:
  enable: true
  exclude:
    - '*.min.css'
neat_js:
  enable: true
  mangle: true
  output:
  compress:
  exclude:
    - '*.min.js'

# 禁用 swig 标签处理（避免 GitHub Actions 语法被误识别）
swig:
  enabled: false

# hexo-renderer-marked: 禁用 Nunjucks 标签处理（避免 {{ }} 被误识别为模板）
marked:
  disableNunjucks: true
